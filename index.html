<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Musguito Quest</title>
    <style>
        @import url('https://fonts.cdnfonts.com/css/minecraftia');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }

        :root {
            --mc-bg: #c6c6c6;
            --mc-border: #000;
            --mc-green: #5da54a;
            --mc-shadow: #555;
            --mc-gold: #ffcc00;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Minecraftia', sans-serif;
            background-color: #000;
            image-rendering: pixelated;
        }

        .main-wall {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('Background.png');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        #game-container {
            width: 100%; height: 100%;
            background-color: rgba(198, 198, 198, 0.85);
            border: 5px solid var(--mc-border);
            box-shadow: inset -4px -4px 0px var(--mc-shadow), inset 4px 4px 0px #fff;
            display: flex; flex-direction: column;
            padding: env(safe-area-inset-top) 10px env(safe-area-inset-bottom) 10px;
        }

        #menu-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('Inicio.png');
            background-size: cover;
            background-position: center;
            z-index: 100;
            display: flex; flex-direction: column;
            justify-content: flex-end; align-items: center;
            padding-bottom: 20%;
        }

        #top-bar {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.7); border: 3px solid #000;
            padding: 8px 12px; margin: 5px 0;
        }

        #hearts-display { color: #ff0000; font-size: 1rem; text-shadow: 2px 2px 0px #000; }
        #coin-display { color: var(--mc-gold); font-size: 0.8rem; text-shadow: 1px 1px 0px #000; }
        .day-label { font-size: 0.65rem; color: #fff; text-shadow: 1px 1px 0px #000; }

        #visual-box {
            flex: 1.5;
            background-image: url('Background.png');
            background-size: cover;
            background-position: center;
            border: 4px solid #000;
            display: flex; justify-content: center; align-items: flex-end;
            margin-bottom: 10px; position: relative; min-height: 160px;
        }

        #musguito-sprite { height: 90%; width: auto; image-rendering: pixelated; position: relative; z-index: 5; }
        
        /* Capa para accesorios comprados */
        #accessory-layer {
            position: absolute; height: 90%; width: auto;
            bottom: 0; z-index: 10; pointer-events: none;
        }

        #dialogue-box {
            background: #fff; border: 3px solid #000;
            padding: 12px; color: #111; font-size: 0.75rem;
            min-height: 95px; max-height: 115px; margin-bottom: 10px;
            box-shadow: inset 3px 3px 0 #bbb; line-height: 1.3;
            overflow-y: auto;
        }

        #action-list { display: flex; flex-direction: column; gap: 6px; padding-bottom: 10px; margin-top: auto; }

        .btn {
            background: #999; border: 3px solid #000;
            box-shadow: inset -3px -3px 0 #555, inset 3px 3px 0 #ccc;
            color: #fff; padding: 12px 6px;
            font-family: 'Minecraftia', sans-serif; font-size: 0.7rem;
            text-shadow: 1px 1px 0 #000; cursor: pointer; width: 100%;
        }

        .btn:active { transform: translateY(2px); box-shadow: inset 3px 3px 0 #555; }
        .btn-green { background: var(--mc-green); box-shadow: inset -3px -3px 0 #3a6b30, inset 3px 3px 0 #a4e095; }
        .btn-shop { background: #5a96ff; box-shadow: inset -3px -3px 0 #2a56a5, inset 3px 3px 0 #9fc2ff; }
        
        .hidden { display: none !important; }

        /* Estilo Tienda */
        #shop-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 200;
            display: flex; flex-direction: column; padding: 20px;
        }
    </style>
</head>
<body>

<div class="main-wall"></div>

<div id="game-container">
    <div id="menu-screen">
        <button class="btn btn-green" onclick="initGame()" style="width: 80%; margin-bottom: 10px;">JUGAR</button>
        <button class="btn btn-shop" onclick="toggleShop(true)" style="width: 80%;">TIENDA</button>
    </div>

    <div id="top-bar">
        <div class="day-label">DÍA <span id="day-counter">1</span></div>
        <div id="coin-display">🪙 <span id="coins">0</span></div>
        <div id="hearts-display">❤❤❤</div>
    </div>

    <div id="visual-box">
        <img src="Musguito.png" id="musguito-sprite" alt="Musguito">
        <img src="" id="accessory-layer" class="hidden">
    </div>

    <div id="dialogue-box">Generando mundo...</div>
    <div id="action-list"></div>
</div>

<div id="shop-overlay" class="hidden">
    <h2 style="color: var(--mc-gold); text-align: center; font-size: 1rem;">TIENDA DE ACCESORIOS</h2>
    <div id="shop-items" style="flex: 1; overflow-y: auto; margin: 15px 0;"></div>
    <button class="btn" onclick="toggleShop(false)">VOLVER</button>
</div>

<script>
    const dic = {
        sujetos: ["Un Creeper", "Un Zombie", "Un Enderman", "Un Esqueleto", "Un Slime", "Un Ghast", "Un Aldeano", "Un Golem", "Un Piglin", "Un Wither"],
        adjetivos: ["brillante", "enojado", "gigante", "invisible", "mutante", "hambriento", "volador", "veloz", "legendario", "pro"],
        verbos: ["custodia", "ataca", "roba", "destruye", "invade", "bloquea", "quema", "observa", "amenaza", "protege"],
        objetos: ["el pico de diamante", "una manzana de oro", "el portal al Nether", "tu base de madera", "un bloque de TNT", "tu inventario", "una cama de lana"],
        lugares: ["en el desierto", "en una cueva", "en el Nether", "en la aldea", "bajo el mar", "en el End", "en la jungla"],
        acciones: ["Usar", "Lanzar", "Craftear", "Atacar con", "Huir con", "Defenderse con"],
        herramientas: ["espada de madera", "perla de ender", "cubo de agua", "manzana dorada", "bloque de tierra", "arco encantado"]
    };

    const accessories = [
        { id: 'corona', name: 'Corona de Rey', price: 50, img: 'Corona.png' },
        { id: 'gafas', name: 'Gafas Pro', price: 100, img: 'Gafas.png' },
        { id: 'capa', name: 'Capa Épica', price: 250, img: 'Capa.png' },
        { id: 'espada', name: 'Espada Espalda', price: 500, img: 'EspadaAcc.png' }
    ];

    let state = {
        day: 1,
        hp: 3,
        coins: parseInt(localStorage.getItem('mCoins')) || 0,
        owned: JSON.parse(localStorage.getItem('mOwned')) || [],
        equipped: localStorage.getItem('mEquipped') || null
    };

    function save() {
        localStorage.setItem('mCoins', state.coins);
        localStorage.setItem('mOwned', JSON.stringify(state.owned));
        localStorage.setItem('mEquipped', state.equipped || '');
        document.getElementById('coins').innerText = state.coins;
    }

    function random(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    function toggleShop(show) {
        const shop = document.getElementById('shop-overlay');
        if (show) {
            shop.classList.remove('hidden');
            renderShop();
        } else {
            shop.classList.add('hidden');
            applyAccessory();
        }
    }

    function renderShop() {
        const container = document.getElementById('shop-items');
        container.innerHTML = `<p style='color:#fff; font-size:0.7rem; text-align:center;'>Monedas: ${state.coins}</p>`;
        accessories.forEach(acc => {
            const isOwned = state.owned.includes(acc.id);
            const isEquipped = state.equipped === acc.id;
            const itemDiv = document.createElement('div');
            itemDiv.style.cssText = "background:#444; border:2px solid #000; padding:10px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;";
            itemDiv.innerHTML = `
                <div style="font-size:0.6rem; color:#fff;">${acc.name}<br><span style="color:var(--mc-gold)">${acc.price} 🪙</span></div>
                <button class="btn" style="width:auto; padding:5px 10px; font-size:0.5rem;" onclick="buyOrEquip('${acc.id}', ${acc.price})">
                    ${isEquipped ? 'EQUIPADO' : (isOwned ? 'PONER' : 'COMPRAR')}
                </button>
            `;
            container.appendChild(itemDiv);
        });
    }

    function buyOrEquip(id, price) {
        if (state.owned.includes(id)) {
            state.equipped = (state.equipped === id) ? null : id;
        } else if (state.coins >= price) {
            state.coins -= price;
            state.owned.push(id);
            state.equipped = id;
        }
        save();
        renderShop();
    }

    function applyAccessory() {
        const layer = document.getElementById('accessory-layer');
        if (state.equipped) {
            const acc = accessories.find(a => a.id === state.equipped);
            layer.src = acc.img;
            layer.classList.remove('hidden');
        } else {
            layer.classList.add('hidden');
        }
    }

    function initGame() {
        document.getElementById('menu-screen').classList.add('hidden');
        state.day = 1; state.hp = 3;
        drawHearts();
        applyAccessory();
        renderTurn();
    }

    function setMood(type) {
        const sprite = document.getElementById('musguito-sprite');
        const moodMap = { 'normal': '', 'win': '1', 'think': '2', 'hurt': '3', 'lost': '4' };
        sprite.src = `Musguito${moodMap[type]}.png`;
    }

    function renderTurn() {
        if (state.hp <= 0) return handleDeath();
        setMood('normal');
        document.getElementById('day-counter').innerText = state.day;
        document.getElementById('dialogue-box').innerText = `${random(dic.sujetos)} ${random(dic.adjetivos)} ${random(dic.verbos)} ${random(dic.objetos)} ${random(dic.lugares)}. ¿Qué haces?`;
        
        const list = document.getElementById('action-list');
        list.innerHTML = '';
        let opts = new Set();
        while(opts.size < 2) opts.add(`${random(dic.acciones)} ${random(dic.herramientas)}`);
        opts.forEach(text => {
            const b = document.createElement('button');
            b.className = 'btn';
            b.innerText = text;
            b.onclick = () => resolve();
            list.appendChild(b);
        });
    }

    function resolve() {
        const r = Math.random();
        let feedback = "";
        let reward = state.day * 5; // Más días = más monedas

        if (r > 0.65) {
            feedback = `¡ÉXITO! Ganaste ${reward} monedas por tu valentía.`;
            state.coins += reward;
            setMood('win');
        } else if (r > 0.35) {
            feedback = "RESULTADO NEUTRO. No ganas nada, pero sigues vivo.";
            setMood('think');
        } else {
            feedback = "¡OOF! Perdiste un corazón intentándolo.";
            state.hp--;
            setMood('hurt');
        }
        state.day++;
        save();
        drawHearts();
        document.getElementById('dialogue-box').innerText = feedback;
        const list = document.getElementById('action-list');
        list.innerHTML = '<button class="btn btn-green" onclick="renderTurn()">CONTINUAR</button>';
    }

    function drawHearts() {
        let h = "";
        for(let i=0; i<3; i++) h += i < state.hp ? "❤" : "🖤";
        document.getElementById('hearts-display').innerText = h;
    }

    function handleDeath() {
        setMood('lost');
        document.getElementById('dialogue-box').innerText = `HAS MUERTO. Sobreviviste ${state.day - 1} días.`;
        const list = document.getElementById('action-list');
        list.innerHTML = '<button class="btn" style="background:#b03a2e" onclick="location.reload()">RESPAWN</button>';
    }

    // Carga inicial
    document.getElementById('coins').innerText = state.coins;
    applyAccessory();
</script>

</body>
</html>
