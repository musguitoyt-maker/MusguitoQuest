<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Musguito Quest</title>
    <style>
        @import url('https://fonts.cdnfonts.com/css/minecraftia');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }

        :root {
            --mc-bg: #c6c6c6;
            --mc-border: #000;
            --mc-green: #5da54a;
            --mc-shadow: #555;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Minecraftia', sans-serif;
            background-color: #000;
            image-rendering: pixelated;
        }

        .main-wall {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('Background.png');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        #game-container {
            width: 100%; height: 100%;
            background-color: rgba(198, 198, 198, 0.85);
            border: 5px solid var(--mc-border);
            box-shadow: inset -4px -4px 0px var(--mc-shadow), inset 4px 4px 0px #fff;
            display: flex; flex-direction: column;
            padding: env(safe-area-inset-top) 10px env(safe-area-inset-bottom) 10px;
        }

        /* ANIMACIONES */
        @keyframes idle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        @keyframes hurt {
            0%, 100% { transform: translateX(0); filter: none; }
            25% { transform: translateX(-8px); filter: brightness(0.5) sepia(1) saturate(10) hue-rotate(-50deg); }
            75% { transform: translateX(8px); }
        }

        .anim-idle { animation: idle 3s infinite ease-in-out; }
        .anim-hurt { animation: hurt 0.3s ease-in-out; }
        .anim-win { animation: idle 0.2s infinite ease-in-out; }

        #menu-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('Inicio.png'); background-size: cover;
            background-position: center; z-index: 100;
            display: flex; flex-direction: column; justify-content: flex-end;
            align-items: center; padding-bottom: 20%;
        }

        #top-bar {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.7); border: 3px solid #000;
            padding: 8px 12px; margin: 5px 0;
        }

        #hearts-display { color: #ff0000; font-size: 1.2rem; text-shadow: 2px 2px 0px #000; }
        .day-label { font-size: 0.75rem; color: #fff; text-shadow: 1px 1px 0px #000; }

        #visual-box {
            flex: 1.5; background-image: url('Background.png');
            background-size: cover; background-position: center;
            border: 4px solid #000; display: flex; justify-content: center;
            align-items: flex-end; margin-bottom: 10px; position: relative;
            min-height: 160px; overflow: hidden;
        }

        #sprite-container {
            height: 90%; position: relative; display: flex; justify-content: center; align-items: flex-end;
        }

        #musguito-sprite {
            height: 100%; width: auto; image-rendering: pixelated;
        }

        #dialogue-box {
            background: #fff; border: 3px solid #000;
            padding: 12px; color: #111; font-size: 0.75rem;
            min-height: 95px; max-height: 115px; margin-bottom: 10px;
            box-shadow: inset 3px 3px 0 #bbb; line-height: 1.3; overflow-y: auto;
        }

        #action-list { display: flex; flex-direction: column; gap: 6px; padding-bottom: 10px; margin-top: auto; }

        .btn {
            background: #999; border: 3px solid #000;
            box-shadow: inset -3px -3px 0 #555, inset 3px 3px 0 #ccc;
            color: #fff; padding: 12px 6px;
            font-family: 'Minecraftia', sans-serif; font-size: 0.7rem;
            text-shadow: 1px 1px 0 #000; cursor: pointer; width: 100%;
        }

        .btn:active { transform: translateY(2px); box-shadow: inset 3px 3px 0 #555; }
        .btn-green { background: var(--mc-green); box-shadow: inset -3px -3px 0 #3a6b30, inset 3px 3px 0 #a4e095; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="main-wall"></div>

<div id="game-container">
    <div id="menu-screen">
        <button class="btn btn-green" onclick="initGame()" style="width: 80%;">JUGAR</button>
    </div>

    <div id="top-bar">
        <span class="day-label">DÍA <span id="day-counter">1</span></span>
        <span id="hearts-display">❤❤❤</span>
    </div>

    <div id="visual-box">
        <div class="sprite-wrapper anim-idle" id="sprite-container">
            <img src="Musguito.png" id="musguito-sprite" alt="Musguito">
        </div>
    </div>

    <div id="dialogue-box">Generando mundo...</div>
    <div id="action-list"></div>
</div>

<script>
    const dic = {
        sujetos: ["Un Creeper", "Un Zombie", "Un Enderman", "Un Esqueleto", "Un Slime", "Un Ghast", "Un Aldeano", "Un Golem", "Un Piglin", "Un Wither", "Un Blaze", "Un Warden", "Un Shulker", "Un Ravager"],
        adjetivos: ["enfurecido", "invisible", "gigante", "místico", "legendario", "con lag", "explosivo", "pixelado", "brillante", "pro"],
        verbos: ["custodia", "ataca", "roba", "destruye", "bloquea el paso a", "quema", "observa fijamente", "amenaza con quitarte", "protege ferozmente", "sabotea"],
        objetos: ["el pico de diamante", "una manzana de oro", "el portal al Nether", "tu base secreta", "un bloque de TNT", "tu inventario", "una cama roja", "el huevo de dragón"],
        lugares: ["en el desierto", "en una cueva", "en el Nether", "en la aldea", "bajo el mar", "en el End", "en la jungla", "en tu sótano", "en una fortaleza"],
        acciones: ["Usar", "Lanzar", "Craftear", "Atacar con", "Huir con", "Defenderse con", "Saltar sobre", "Comer"],
        herramientas: ["espada de madera", "perla de ender", "cubo de agua", "manzana dorada", "bloque de tierra", "arco encantado", "escudo de hierro", "tridente"]
    };

    let state = { day: 1, hp: 3 };

    function random(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    function setMood(type) {
        const sprite = document.getElementById('musguito-sprite');
        const moodMap = { 'normal': '', 'win': '1', 'think': '2', 'hurt': '3', 'lost': '4' };
        sprite.src = `Musguito${moodMap[type]}.png`;
        
        const container = document.getElementById('sprite-container');
        if (type === 'hurt') playAnim('anim-hurt');
        else if (type === 'win') playAnim('anim-win');
        else container.className = 'sprite-wrapper anim-idle';
    }

    function playAnim(name) {
        const container = document.getElementById('sprite-container');
        container.className = 'sprite-wrapper ' + name;
        if(name !== 'anim-idle') setTimeout(() => { container.className = 'sprite-wrapper anim-idle'; }, 500);
    }

    function initGame() {
        document.getElementById('menu-screen').classList.add('hidden');
        state.day = 1; state.hp = 3;
        drawHearts();
        renderTurn();
    }

    function renderTurn() {
        if (state.hp <= 0) return handleDeath();
        setMood('normal');
        document.getElementById('day-counter').innerText = state.day;
        document.getElementById('dialogue-box').innerText = `${random(dic.sujetos)} ${random(dic.adjetivos)} ${random(dic.verbos)} ${random(dic.objetos)} ${random(dic.lugares)}. ¿Qué vas a hacer?`;
        
        const list = document.getElementById('action-list');
        list.innerHTML = '';
        let opts = new Set();
        while(opts.size < 2) opts.add(`${random(dic.acciones)} ${random(dic.herramientas)}`);
        
        opts.forEach(text => {
            const b = document.createElement('button');
            b.className = 'btn';
            b.innerText = text;
            b.onclick = resolve;
            list.appendChild(b);
        });
    }

    function resolve() {
        const r = Math.random();
        let feedback = "";
        
        if (r > 0.65) {
            feedback = "¡ÉXITO! Lograste superar el obstáculo de forma épica.";
            setMood('win');
        } else if (r > 0.35) {
            feedback = "RESULTADO NEUTRO. No pasó nada grave, pero te quedas pensando.";
            setMood('think');
        } else {
            feedback = "¡OOF! Saliste herido en el proceso. Perdiste un corazón.";
            state.hp--;
            setMood('hurt');
        }

        state.day++;
        drawHearts();
        document.getElementById('dialogue-box').innerText = feedback;
        const list = document.getElementById('action-list');
        list.innerHTML = '<button class="btn btn-green" onclick="renderTurn()">CONTINUAR</button>';
    }

    function drawHearts() {
        let h = "";
        for(let i=0; i<3; i++) h += i < state.hp ? "❤" : "🖤";
        document.getElementById('hearts-display').innerText = h;
    }

    function handleDeath() {
        setMood('lost');
        document.getElementById('dialogue-box').innerText = "Has muerto. Sobreviviste " + (state.day - 1) + " días.";
        const list = document.getElementById('action-list');
        list.innerHTML = '<button class="btn" style="background:#b03a2e" onclick="location.reload()">RESPAWN</button>';
    }

    drawHearts();
</script>

</body>
</html>
