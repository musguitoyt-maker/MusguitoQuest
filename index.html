<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Musguito Quest</title>
    <style>
        @import url('https://fonts.cdnfonts.com/css/minecraftia');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }

        :root {
            --mc-bg: #c6c6c6;
            --mc-border: #000;
            --mc-green: #5da54a;
            --mc-shadow: #555;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Minecraftia', sans-serif;
            background-color: #000;
            image-rendering: pixelated;
        }

        /* FONDO GENERAL */
        .main-wall {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('Background.png');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        #game-container {
            width: 100%; height: 100%;
            background-color: rgba(198, 198, 198, 0.85);
            border: 6px solid var(--mc-border);
            box-shadow: inset -6px -6px 0px var(--mc-shadow), inset 6px 6px 0px #fff;
            display: flex;
            flex-direction: column;
            padding: env(safe-area-inset-top) 15px env(safe-area-inset-bottom) 15px;
        }

        /* PANTALLA DE INICIO LLAMATIVA */
        #menu-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('Inicio.png');
            background-size: cover;
            background-position: center;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 80px;
        }

        /* INTERFAZ */
        #top-bar {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.7); border: 4px solid #000;
            padding: 10px 15px; margin: 10px 0;
        }

        #hearts-display { color: #ff0000; font-size: 1.5rem; text-shadow: 2px 2px 0px #000; }
        .day-label { font-size: 0.9rem; color: #fff; text-shadow: 1px 1px 0px #000; }

        /* CUADRO DE MUSGUITO CON FONDO PROPIO */
        #visual-box {
            flex: 2;
            background-image: url('Background.png');
            background-size: cover;
            background-position: center;
            border: 4px solid #000;
            display: flex; justify-content: center; align-items: flex-end;
            margin-bottom: 12px;
            box-shadow: inset 0 0 0 1000px rgba(0,0,0,0.2); /* Oscurece un poco el fondo para resaltar el sprite */
            position: relative;
        }

        #musguito-sprite {
            height: 85%; width: auto;
            image-rendering: pixelated;
            filter: drop-shadow(0 0 5px rgba(0,0,0,0.5));
        }

        #dialogue-box {
            background: #fff; border: 4px solid #000;
            padding: 15px; color: #111; font-size: 0.85rem;
            min-height: 110px; margin-bottom: 12px;
            box-shadow: inset 3px 3px 0 #bbb; line-height: 1.5;
        }

        #action-list { display: flex; flex-direction: column; gap: 8px; padding-bottom: 15px; }

        .btn {
            background: #999; border: 4px solid #000;
            box-shadow: inset -4px -4px 0 #555, inset 4px 4px 0 #ccc;
            color: #fff; padding: 18px 10px;
            font-family: 'Minecraftia', sans-serif; font-size: 0.8rem;
            text-shadow: 2px 2px 0 #000; cursor: pointer; width: 100%;
        }

        .btn:active { transform: translateY(2px); box-shadow: inset 4px 4px 0 #555; }
        .btn-green { background: var(--mc-green); box-shadow: inset -4px -4px 0 #3a6b30, inset 4px 4px 0 #a4e095; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="main-wall"></div>

<div id="game-container">
    <div id="menu-screen">
        <button class="btn btn-green" onclick="initGame()" style="width: 80%;">EMPEZAR AVENTURA</button>
    </div>

    <div id="top-bar">
        <span class="day-label">SUPERVIVENCIA: DÍA <span id="day-counter">1</span></span>
        <span id="hearts-display">❤❤❤</span>
    </div>

    <div id="visual-box">
        <img src="Musguito.png" id="musguito-sprite" alt="Musguito">
    </div>

    <div id="dialogue-box">Cargando mundo...</div>

    <div id="action-list"></div>
</div>

<script>
    const world = {
        situations: [
            { txt: "¡Un rayo cae sobre un cerdo y se convierte en un Hombre Cerdo Zombi frente a ti!", mood: "think" },
            { txt: "Encuentras una Mansión del Bosque, pero la puerta se cierra sola al entrar.", mood: "normal" },
            { txt: "Un comerciante errante te ofrece una llama a cambio de nada. Sospechoso...", mood: "think" },
            { txt: "¡Te caes en un agujero y aterrizas sobre una cama elástica de Slimes!", mood: "normal" },
            { txt: "Un pequeño zombi montado sobre un pollo te persigue a toda velocidad.", mood: "think" },
            { txt: "Escuchas el sonido de un cofre abriéndose... pero estás solo en la cueva.", mood: "hurt" },
            { txt: "¡Has encontrado la mítica Manzana de Notcho flotando en el aire!", mood: "win" }
        ],
        actions: [
            { t: "Hacer un Waterdrop épico", b: "¡Caes como un pro y todos aplauden!", n: "Mojaste el suelo, pero estás bien.", m: "Pusiste el agua tarde. ¡Ouch!" },
            { t: "Comer pan de muesli", b: "¡Energía infinita! Corres más rápido.", n: "Sabe un poco a tierra.", m: "Te atragantas y pierdes aire." },
            { t: "Atacar con un palo", b: "¡Crítico legendario! El enemigo huye.", n: "No le haces nada, pero se ríe.", m: "El palo se rompe en tu mano." },
            { t: "Esconderse en un barril", b: "Nadie te ve. Pasan de largo.", n: "Huele a pescado podrido.", m: "Te quedas atascado dentro." },
            { t: "Usar una perla de Ender", b: "Apareces detrás del peligro.", n: "Te mareas un poco al viajar.", m: "Apareces en medio de una pared." }
        ]
    };

    let state = { day: 1, hp: 3 };

    function initGame() {
        document.getElementById('menu-screen').classList.add('hidden');
        renderTurn();
    }

    function setMood(type) {
        const sprite = document.getElementById('musguito-sprite');
        const moodMap = { 'normal': '', 'win': '1', 'think': '2', 'hurt': '3', 'lost': '4' };
        sprite.src = `Musguito${moodMap[type]}.png`;
        sprite.onerror = () => { sprite.alt = `[Musguito ${type}]`; };
    }

    function renderTurn() {
        if (state.hp <= 0) return handleDeath();
        
        const sit = world.situations[Math.floor(Math.random() * world.situations.length)];
        setMood('normal');
        document.getElementById('day-counter').innerText = state.day;
        document.getElementById('dialogue-box').innerText = sit.txt;
        
        const list = document.getElementById('action-list');
        list.innerHTML = '';

        const pool = [...world.actions].sort(() => 0.5 - Math.random()).slice(0, 2);
        pool.forEach(opt => {
            const b = document.createElement('button');
            b.className = 'btn';
            b.innerText = opt.t;
            b.onclick = () => resolve(opt);
            list.appendChild(b);
        });
    }

    function resolve(opt) {
        const r = Math.random();
        let feedback = "";
        
        if (r > 0.6) {
            feedback = "¡ÉXITO! " + opt.b;
            setMood('win');
        } else if (r > 0.3) {
            feedback = "NOTICIA: " + opt.n;
            setMood('think');
        } else {
            feedback = "¡MALAS NOTICIAS! " + opt.m;
            state.hp--;
            setMood('hurt');
        }

        state.day++;
        drawHearts();
        
        document.getElementById('dialogue-box').innerText = feedback;
        const list = document.getElementById('action-list');
        list.innerHTML = '<button class="btn btn-green" onclick="renderTurn()">CONTINUAR</button>';
    }

    function drawHearts() {
        let h = "";
        for(let i=0; i<3; i++) h += i < state.hp ? "❤" : "🖤";
        document.getElementById('hearts-display').innerText = h;
    }

    function handleDeath() {
        setMood('lost');
        document.getElementById('dialogue-box').innerText = "¡HAS PERDIDO! Sobreviviste " + state.day + " días. Musguito ha dejado el mundo.";
        const list = document.getElementById('action-list');
        list.innerHTML = '<button class="btn" style="background:#b03a2e" onclick="location.reload()">RESPAWN</button>';
    }

    drawHearts();
</script>

</body>
</html>
