<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Musguito Quest</title>
    <style>
        @import url('https://fonts.cdnfonts.com/css/minecraftia');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }

        :root {
            --mc-bg: #c6c6c6;
            --mc-border: #000;
            --mc-green: #5da54a;
            --mc-shadow: #555;
            --mc-gold: #ffcc00;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Minecraftia', sans-serif;
            background-color: #000;
            image-rendering: pixelated;
        }

        .main-wall {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('Background.png');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        #game-container {
            width: 100%; height: 100%;
            background-color: rgba(198, 198, 198, 0.85);
            border: 5px solid var(--mc-border);
            box-shadow: inset -4px -4px 0px var(--mc-shadow), inset 4px 4px 0px #fff;
            display: flex; flex-direction: column;
            padding: env(safe-area-inset-top) 10px env(safe-area-inset-bottom) 10px;
        }

        /* ANIMACIONES */
        @keyframes idle {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-5px) scale(1.02); }
        }

        @keyframes hurt {
            0% { transform: translateX(0); filter: coral; }
            25% { transform: translateX(-10px); filter: brightness(0.5) sepia(1) saturate(10) hue-rotate(-50deg); }
            75% { transform: translateX(10px); }
            100% { transform: translateX(0); }
        }

        @keyframes win {
            0% { transform: scale(1); }
            50% { transform: scale(1.2) rotate(5deg); }
            100% { transform: scale(1); }
        }

        .anim-idle { animation: idle 3s infinite ease-in-out; }
        .anim-hurt { animation: hurt 0.4s ease-in-out; }
        .anim-win { animation: win 0.5s ease-in-out; }

        #menu-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('Inicio.png');
            background-size: cover;
            background-position: center;
            z-index: 100;
            display: flex; flex-direction: column;
            justify-content: flex-end; align-items: center;
            padding-bottom: 20%;
        }

        #top-bar {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.7); border: 3px solid #000;
            padding: 8px 12px; margin: 5px 0;
        }

        #coin-display { color: var(--mc-gold); font-size: 0.8rem; text-shadow: 1px 1px 0px #000; }
        #hearts-display { color: #ff0000; font-size: 1rem; }

        #visual-box {
            flex: 1.5;
            background-image: url('Background.png');
            background-size: cover;
            background-position: center;
            border: 4px solid #000;
            display: flex; justify-content: center; align-items: flex-end;
            margin-bottom: 10px; position: relative; min-height: 160px;
            overflow: hidden;
        }

        .sprite-wrapper {
            height: 90%; position: relative; display: flex; justify-content: center; align-items: flex-end;
        }

        #musguito-sprite, #accessory-layer {
            height: 100%; width: auto; image-rendering: pixelated;
        }

        #accessory-layer { position: absolute; top: 0; z-index: 10; }

        #dialogue-box {
            background: #fff; border: 3px solid #000;
            padding: 12px; color: #111; font-size: 0.75rem;
            min-height: 95px; max-height: 115px; margin-bottom: 10px;
            box-shadow: inset 3px 3px 0 #bbb; line-height: 1.3; overflow-y: auto;
        }

        #action-list { display: flex; flex-direction: column; gap: 6px; padding-bottom: 10px; margin-top: auto; }

        .btn {
            background: #999; border: 3px solid #000;
            box-shadow: inset -3px -3px 0 #555, inset 3px 3px 0 #ccc;
            color: #fff; padding: 12px 6px;
            font-family: 'Minecraftia', sans-serif; font-size: 0.7rem;
            text-shadow: 1px 1px 0 #000; cursor: pointer; width: 100%;
        }

        .btn-green { background: var(--mc-green); box-shadow: inset -3px -3px 0 #3a6b30, inset 3px 3px 0 #a4e095; }
        .btn-shop { background: #5a96ff; box-shadow: inset -3px -3px 0 #2a56a5, inset 3px 3px 0 #9fc2ff; }
        
        #shop-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 200;
            display: flex; flex-direction: column; padding: 20px;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="main-wall"></div>

<div id="game-container">
    <div id="menu-screen">
        <button class="btn btn-green" onclick="initGame()" style="width: 80%; margin-bottom: 10px;">JUGAR</button>
        <button class="btn btn-shop" onclick="toggleShop(true)" style="width: 80%;">TIENDA</button>
    </div>

    <div id="top-bar">
        <div id="coin-display">🪙 <span id="coins">0</span></div>
        <div id="hearts-display">❤❤❤</div>
    </div>

    <div id="visual-box">
        <div class="sprite-wrapper anim-idle" id="sprite-container">
            <img src="Musguito.png" id="musguito-sprite" alt="Musguito">
            <img src="" id="accessory-layer" class="hidden">
        </div>
    </div>

    <div id="dialogue-box">Iniciando mundo...</div>
    <div id="action-list"></div>
</div>

<div id="shop-overlay" class="hidden">
    <h2 style="color: var(--mc-gold); text-align: center; font-size: 0.9rem;">MERCADO MUSGUITO</h2>
    <div id="shop-items" style="flex: 1; overflow-y: auto;"></div>
    <button class="btn" onclick="toggleShop(false)">VOLVER</button>
</div>

<script>
    // DICCIONARIO AMPLIADO (Combinatoria masiva para >10,000 variantes)
    const dic = {
        sujetos: ["Un Creeper", "Un Zombie", "Un Enderman", "Un Esqueleto", "Un Slime", "Un Ghast", "Un Aldeano", "Un Golem", "Un Piglin", "Un Wither", "Un Blaze", "Un Phantom", "Un Shulker", "Un Guardián", "Un Ravager", "Un Hoglin", "Un Zoglin", "Un Warden", "Un Allay", "Un Vex", "Un Vindicator", "Un Evocador", "Un Silverfish", "Un Magma Cube"],
        adjetivos: ["enfurecido", "invisible", "con armadura de oro", "mutante", "gigante", "hambriento", "místico", "legendario", "con lag", "explosivo", "corrupto", "pixelado", "brillante", "sediento de sangre", "despistado", "pro", "hacker", "pequeño", "maldito", "encantado"],
        verbos: ["custodia", "ataca sin piedad", "roba", "destruye", "bloquea el paso a", "quema", "observa fijamente", "amenaza con quitarte", "protege ferozmente", "esconde", "invoca aliados hacia", "sabotea", "vigila desde lejos", "golpea"],
        objetos: ["el pico de diamante", "una manzana de oro", "el portal al Nether", "tu base secreta", "un bloque de TNT", "el inventario", "una cama roja", "la estrella del Wither", "tu armadura de netherite", "un cubo con lava", "una perla de ender", "el huevo de dragón", "una ballesta cargada", "tu última tarta"],
        lugares: ["en el desierto", "en una cueva oscura", "en el Nether", "en la aldea desierta", "bajo el océano", "en el End", "en la jungla", "en tu sótano", "en la cima de la montaña", "en una fortaleza", "en el Pantano", "en una Bastion", "en el Stronghold"],
        
        acciones: ["Usar", "Lanzar", "Craftear", "Atacar con", "Huir con", "Defenderse con", "Saltar sobre", "Construir con", "Comer", "Ofrecer"],
        herramientas: ["espada de madera", "perla de ender", "cubo de agua", "manzana dorada", "bloque de tierra", "arco encantado", "fuegos artificiales", "poción de invisibilidad", "tarta de calabaza", "escudo de hierro", "mechero", "caña de pescar", "ala de elitra", "tridente"]
    };

    const accessories = [
        { id: 'corona', name: 'Corona Real', price: 100, img: 'Corona.png' },
        { id: 'gafas', name: 'Gafas Thug', price: 200, img: 'Gafas.png' },
        { id: 'capa', name: 'Capa de Admin', price: 500, img: 'Capa.png' },
        { id: 'espada', name: 'Espada Legendaria', price: 1000, img: 'EspadaAcc.png' }
    ];

    let state = {
        day: 1, hp: 3,
        coins: parseInt(localStorage.getItem('mCoins')) || 0,
        owned: JSON.parse(localStorage.getItem('mOwned')) || [],
        equipped: localStorage.getItem('mEquipped') || null
    };

    function save() {
        localStorage.setItem('mCoins', state.coins);
        localStorage.setItem('mOwned', JSON.stringify(state.owned));
        localStorage.setItem('mEquipped', state.equipped || '');
        document.getElementById('coins').innerText = state.coins;
    }

    function random(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    function playAnim(name) {
        const container = document.getElementById('sprite-container');
        container.className = 'sprite-wrapper ' + name;
        if(name !== 'anim-idle') {
            setTimeout(() => { container.className = 'sprite-wrapper anim-idle'; }, 500);
        }
    }

    function toggleShop(show) {
        const shop = document.getElementById('shop-overlay');
        if (show) { shop.classList.remove('hidden'); renderShop(); }
        else { shop.classList.add('hidden'); applyAccessory(); }
    }

    function renderShop() {
        const container = document.getElementById('shop-items');
        container.innerHTML = `<p style='color:var(--mc-gold); text-align:center; font-size:0.7rem;'>Tus Monedas: ${state.coins}</p>`;
        accessories.forEach(acc => {
            const isOwned = state.owned.includes(acc.id);
            const isEquipped = state.equipped === acc.id;
            const itemDiv = document.createElement('div');
            itemDiv.style.cssText = "background:#333; border:2px solid #000; padding:10px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center;";
            itemDiv.innerHTML = `
                <div style="font-size:0.6rem; color:#fff;">${acc.name}<br><span>${acc.price} 🪙</span></div>
                <button class="btn" style="width:auto; padding:5px 8px; font-size:0.5rem;" onclick="buyOrEquip('${acc.id}', ${acc.price})">
                    ${isEquipped ? 'EQUIPADO' : (isOwned ? 'USAR' : 'COMPRAR')}
                </button>
            `;
            container.appendChild(itemDiv);
        });
    }

    function buyOrEquip(id, price) {
        if (state.owned.includes(id)) {
            state.equipped = (state.equipped === id) ? null : id;
        } else if (state.coins >= price) {
            state.coins -= price;
            state.owned.push(id);
            state.equipped = id;
        }
        save(); renderShop();
    }

    function applyAccessory() {
        const layer = document.getElementById('accessory-layer');
        if (state.equipped) {
            const acc = accessories.find(a => a.id === state.equipped);
            layer.src = acc.img;
            layer.classList.remove('hidden');
        } else { layer.classList.add('hidden'); }
    }

    function initGame() {
        document.getElementById('menu-screen').classList.add('hidden');
        state.day = 1; state.hp = 3;
        drawHearts(); applyAccessory(); renderTurn();
    }

    function renderTurn() {
        if (state.hp <= 0) return handleDeath();
        const sit = `${random(dic.sujetos)} ${random(dic.adjetivos)} ${random(dic.verbos)} ${random(dic.objetos)} ${random(dic.lugares)}.`;
        document.getElementById('dialogue-box').innerText = sit + " ¿Cómo respondes?";
        
        const list = document.getElementById('action-list');
        list.innerHTML = '';
        let opts = new Set();
        while(opts.size < 2) opts.add(`${random(dic.acciones)} ${random(dic.herramientas)}`);
        opts.forEach(text => {
            const b = document.createElement('button');
            b.className = 'btn';
            b.innerText = text;
            b.onclick = resolve;
            list.appendChild(b);
        });
    }

    function resolve() {
        const r = Math.random();
        let feedback = "";
        let reward = state.day * 10;

        if (r > 0.6) {
            feedback = `¡INCREÍBLE! Superaste el reto y ganaste ${reward} monedas.`;
            state.coins += reward;
            playAnim('anim-win');
        } else if (r > 0.3) {
            feedback = "No pasó mucho, pero lograste salir ileso de la situación.";
        } else {
            feedback = "¡OOF! Fallaste y recibiste daño. Perdiste un corazón.";
            state.hp--;
            playAnim('anim-hurt');
        }
        state.day++;
        save(); drawHearts();
        document.getElementById('dialogue-box').innerText = feedback;
        const list = document.getElementById('action-list');
        list.innerHTML = '<button class="btn btn-green" onclick="renderTurn()">CONTINUAR</button>';
    }

    function drawHearts() {
        let h = "";
        for(let i=0; i<3; i++) h += i < state.hp ? "❤" : "🖤";
        document.getElementById('hearts-display').innerText = h;
    }

    function handleDeath() {
        document.getElementById('dialogue-box').innerText = `Has caído en el día ${state.day - 1}. Recoge tus cosas y vuelve a intentarlo.`;
        const list = document.getElementById('action-list');
        list.innerHTML = '<button class="btn" style="background:#b03a2e" onclick="location.reload()">RESPAWN</button>';
    }

    document.getElementById('coins').innerText = state.coins;
    applyAccessory();
</script>

</body>
</html>
