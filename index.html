<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Musguito Quest</title>
    <style>
        @import url('https://fonts.cdnfonts.com/css/minecraftia');

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none;
        }

        :root {
            --mc-bg: #c6c6c6;
            --mc-border: #000000;
            --mc-green: #5da54a;
            --mc-shadow: #555555;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Minecraftia', sans-serif;
            /* FONDO PRINCIPAL */
            background-image: url('Background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            image-rendering: pixelated;
        }

        #game-container {
            width: 100%;
            height: 100%;
            background-color: rgba(198, 198, 198, 0.9); /* Fondo semi-transparente para ver el Background.png */
            border: 6px solid var(--mc-border);
            box-shadow: inset -6px -6px 0px var(--mc-shadow), inset 6px 6px 0px #ffffff;
            display: flex;
            flex-direction: column;
            padding: env(safe-area-inset-top) 15px env(safe-area-inset-bottom) 15px;
        }

        /* PANTALLA DE INICIO */
        #menu-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .title-logo {
            font-size: 2.2rem;
            color: var(--mc-green);
            text-shadow: 4px 4px 0px #000;
            margin-bottom: 60px;
            text-align: center;
        }

        /* INTERFAZ DE JUEGO */
        #top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.6);
            border: 4px solid #000;
            padding: 10px 15px;
            margin-top: 10px;
            margin-bottom: 10px;
        }

        #hearts-display { color: #ff0000; font-size: 1.5rem; text-shadow: 2px 2px 0px #000; }
        .day-label { font-size: 0.9rem; color: #fff; text-shadow: 1px 1px 0px #000; }

        #visual-box {
            flex: 2;
            background: rgba(34, 34, 34, 0.8);
            border: 4px solid #000;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            margin-bottom: 12px;
            box-shadow: inset 0 0 40px #000;
            position: relative;
            overflow: hidden;
        }

        #musguito-sprite {
            height: 90%;
            max-width: 90%;
            object-fit: contain;
        }

        #dialogue-box {
            background: #ffffff;
            border: 4px solid #000;
            padding: 15px;
            color: #111;
            font-size: 0.85rem;
            min-height: 100px;
            max-height: 130px;
            margin-bottom: 12px;
            box-shadow: inset 3px 3px 0 #bbb;
            line-height: 1.4;
            overflow-y: auto;
        }

        #action-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-bottom: 15px;
        }

        .btn {
            background: #999;
            border: 4px solid #000;
            box-shadow: inset -4px -4px 0 #555, inset 4px 4px 0 #ccc;
            color: #fff;
            padding: 18px 10px;
            font-family: 'Minecraftia', sans-serif;
            font-size: 0.8rem;
            text-shadow: 2px 2px 0 #000;
            cursor: pointer;
            width: 100%;
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: inset 4px 4px 0 #555;
        }

        .btn-green {
            background: var(--mc-green);
            box-shadow: inset -4px -4px 0 #3a6b30, inset 4px 4px 0 #a4e095;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="menu-screen">
        <div class="title-logo">MUSGUITO<br>QUEST</div>
        <button class="btn btn-green" onclick="initGame()" style="width: 70%;">INICIAR AVENTURA</button>
    </div>

    <div id="top-bar">
        <span class="day-label">DÍA <span id="day-counter">1</span></span>
        <span id="hearts-display">❤❤❤</span>
    </div>

    <div id="visual-box">
        <img src="Musguito.png" id="musguito-sprite" alt="Musguito">
    </div>

    <div id="dialogue-box">Cargando bioma...</div>

    <div id="action-list"></div>
</div>

<script>
    const engine = {
        subjects: ["Un Creeper táctico", "Un Admin furioso", "Un esqueleto con lag", "Un Gólem errante", "Un Slime pegajoso", "Un Vindicator ninja"],
        actions: ["está saboteando", "intenta robar", "está vigilando", "ha escondido", "te persigue por", "quiere destruir"],
        items: ["tu inventario", "una manzana dorada", "tu última antorcha", "el portal al Nether", "tu espada de madera", "un cofre de loot"],
        places: ["en el desierto", "dentro de una mina", "bajo la lluvia", "en un chunk corrupto", "en la cima de la montaña"],

        build() {
            const s = this.subjects[Math.floor(Math.random()*this.subjects.length)];
            const a = this.actions[Math.floor(Math.random()*this.actions.length)];
            const i = this.items[Math.floor(Math.random()*this.items.length)];
            const p = this.places[Math.floor(Math.random()*this.places.length)];
            return `${s} ${a} ${i} ${p}. ¿Qué decides?`;
        },

        choices: [
            { t: "Hacer un Waterdrop", b: "¡Caes perfectamente!", n: "El agua se congeló.", m: "Pusiste el cubo muy tarde." },
            { t: "Usar poción de fuerza", b: "¡Derrotas a todos!", n: "Sabe a medicina.", m: "Era una poción de veneno." },
            { t: "Minar hacia abajo", b: "¡Caes en una mina pro!", n: "Solo hay grava.", m: "Caes en una fosa de lava." },
            { t: "Pedir ayuda al chat", b: "¡Te envían suministros!", n: "Nadie respondió.", m: "Te enviaron coordenadas falsas." }
        ]
    };

    let state = { day: 1, hp: 3 };

    function initGame() {
        document.getElementById('menu-screen').classList.add('hidden');
        render();
    }

    function setImg(type) {
        const sprite = document.getElementById('musguito-sprite');
        const mood = { 'normal': '', 'win': '1', 'think': '2', 'hurt': '3', 'lost': '4' };
        sprite.src = `Musguito${mood[type]}.png`;
        sprite.onerror = () => { sprite.alt = `[Musguito ${type}]`; };
    }

    function render() {
        if (state.hp <= 0) return death();
        
        setImg('normal');
        document.getElementById('day-counter').innerText = state.day;
        document.getElementById('dialogue-box').innerText = engine.build();
        
        const list = document.getElementById('action-list');
        list.innerHTML = '';

        const pool = [...engine.choices].sort(() => 0.5 - Math.random()).slice(0, 2);
        pool.forEach(opt => {
            const b = document.createElement('button');
            b.className = 'btn';
            b.innerText = opt.t;
            b.onclick = () => resolve(opt);
            list.appendChild(b);
        });
    }

    function resolve(opt) {
        const r = Math.random();
        let txt = "";
        
        if (r > 0.65) {
            txt = "¡ÉXITO! " + opt.b;
            setImg('win');
        } else if (r > 0.35) {
            txt = "OK... " + opt.n;
            setImg('think');
        } else {
            txt = "¡AY! " + opt.m;
            state.hp--;
            setImg('hurt');
        }

        state.day++;
        draw();
        
        document.getElementById('dialogue-box').innerText = txt;
        const list = document.getElementById('action-list');
        list.innerHTML = `<button class="btn btn-green" onclick="render()">CONTINUAR</button>`;
    }

    function draw() {
        let h = "";
        for(let i=0; i<3; i++) h += i < state.hp ? "❤" : "🖤";
        document.getElementById('hearts-display').innerText = h;
    }

    function death() {
        setImg('lost');
        document.getElementById('dialogue-box').innerText = "GAME OVER. Sobreviviste " + state.day + " días antes de perder tus ítems.";
        const list = document.getElementById('action-list');
        list.innerHTML = '<button class="btn" style="background:#b03a2e" onclick="location.reload()">RESPAWN</button>';
    }
</script>

</body>
  </html>
