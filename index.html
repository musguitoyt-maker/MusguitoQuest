<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Musguito Quest</title>
    <style>
        @import url('https://fonts.cdnfonts.com/css/minecraftia');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }

        :root {
            --mc-bg: #c6c6c6;
            --mc-border: #000;
            --mc-green: #5da54a;
            --mc-shadow: #555;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Minecraftia', sans-serif;
            background-color: #000;
            image-rendering: pixelated;
        }

        /* FONDO PRINCIPAL */
        .main-wall {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('Background.png');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        #game-container {
            width: 100%; height: 100%;
            background-color: rgba(198, 198, 198, 0.85);
            border: 5px solid var(--mc-border);
            box-shadow: inset -4px -4px 0px var(--mc-shadow), inset 4px 4px 0px #fff;
            display: flex;
            flex-direction: column;
            padding: env(safe-area-inset-top) 10px env(safe-area-inset-bottom) 10px;
        }

        /* PANTALLA DE INICIO CLARA */
        #menu-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('Inicio.png');
            background-size: cover;
            background-position: center;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 15%; /* Ajuste dinámico para botones */
        }

        /* INTERFAZ SUPERIOR */
        #top-bar {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.7); border: 3px solid #000;
            padding: 8px 12px; margin: 5px 0;
        }

        #hearts-display { color: #ff0000; font-size: 1.2rem; text-shadow: 2px 2px 0px #000; }
        .day-label { font-size: 0.75rem; color: #fff; text-shadow: 1px 1px 0px #000; }

        /* CUADRO VISUAL ADAPTADO */
        #visual-box {
            flex: 1.5;
            background-image: url('Background.png');
            background-size: cover;
            background-position: center;
            border: 4px solid #000;
            display: flex; justify-content: center; align-items: flex-end;
            margin-bottom: 10px;
            position: relative;
            min-height: 180px;
        }

        #musguito-sprite {
            height: 90%; width: auto;
            image-rendering: pixelated;
        }

        /* CUADRO DE DIÁLOGO ADAPTADO PARA MÓVIL */
        #dialogue-box {
            background: #fff; border: 3px solid #000;
            padding: 12px; color: #111; font-size: 0.8rem;
            min-height: 90px; max-height: 110px; margin-bottom: 10px;
            box-shadow: inset 3px 3px 0 #bbb; line-height: 1.4;
            overflow-y: auto;
        }

        /* BOTONES AJUSTADOS PARA TELÉFONO */
        #action-list { 
            display: flex; flex-direction: column; 
            gap: 6px; padding-bottom: 10px; 
            margin-top: auto;
        }

        .btn {
            background: #999; border: 3px solid #000;
            box-shadow: inset -3px -3px 0 #555, inset 3px 3px 0 #ccc;
            color: #fff; padding: 14px 8px;
            font-family: 'Minecraftia', sans-serif; font-size: 0.75rem;
            text-shadow: 1px 1px 0 #000; cursor: pointer; width: 100%;
            text-transform: uppercase;
        }

        .btn:active { transform: translateY(2px); box-shadow: inset 3px 3px 0 #555; }
        .btn-green { background: var(--mc-green); box-shadow: inset -3px -3px 0 #3a6b30, inset 3px 3px 0 #a4e095; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="main-wall"></div>

<div id="game-container">
    <div id="menu-screen">
        <button class="btn btn-green" onclick="initGame()" style="width: 85%;">EMPEZAR</button>
    </div>

    <div id="top-bar">
        <span class="day-label">DÍA <span id="day-counter">1</span></span>
        <span id="hearts-display">❤❤❤</span>
    </div>

    <div id="visual-box">
        <img src="Musguito.png" id="musguito-sprite" alt="Musguito">
    </div>

    <div id="dialogue-box">Cargando mundo...</div>

    <div id="action-list"></div>
</div>

<script>
    const world = {
        situations: [
            { txt: "¡Un rayo cae sobre un cerdo y se convierte en un Hombre Cerdo Zombi frente a ti!" },
            { txt: "Encuentras una Mansión del Bosque, pero la puerta se cierra sola al entrar." },
            { txt: "Un comerciante errante te ofrece una llama a cambio de nada. Sospechoso..." },
            { txt: "¡Te caes en un agujero y aterrizas sobre una cama elástica de Slimes!" },
            { txt: "Un pequeño zombi montado sobre un pollo te persigue a toda velocidad." },
            { txt: "Escuchas el sonido de un cofre abriéndose... pero estás solo en la cueva." },
            { txt: "¡Has encontrado una Manzana de Oro flotando en el aire!" }
        ],
        actions: [
            { t: "Hacer un Waterdrop", b: "¡Caes como un pro!", n: "Mojaste el suelo.", m: "Pusiste el agua tarde. ¡Ouch!" },
            { t: "Comer pan de muesli", b: "¡Energía infinita!", n: "Sabe un poco a tierra.", m: "Te atragantas un poco." },
            { t: "Atacar con un palo", b: "¡Crítico legendario!", n: "No le haces nada.", m: "El palo se rompe." },
            { t: "Esconderse en un barril", b: "Nadie te ve.", n: "Huele a pescado.", m: "Te quedas atascado." },
            { t: "Usar perla de Ender", b: "Apareces lejos.", n: "Te mareas un poco.", m: "Apareces en una pared." }
        ]
    };

    let state = { day: 1, hp: 3 };

    function initGame() {
        document.getElementById('menu-screen').classList.add('hidden');
        renderTurn();
    }

    function setMood(type) {
        const sprite = document.getElementById('musguito-sprite');
        const moodMap = { 'normal': '', 'win': '1', 'think': '2', 'hurt': '3', 'lost': '4' };
        sprite.src = `Musguito${moodMap[type]}.png`;
        sprite.onerror = () => { sprite.alt = `[Musguito ${type}]`; };
    }

    function renderTurn() {
        if (state.hp <= 0) return handleDeath();
        
        const sit = world.situations[Math.floor(Math.random() * world.situations.length)];
        setMood('normal');
        document.getElementById('day-counter').innerText = state.day;
        document.getElementById('dialogue-box').innerText = sit.txt;
        
        const list = document.getElementById('action-list');
        list.innerHTML = '';

        const pool = [...world.actions].sort(() => 0.5 - Math.random()).slice(0, 2);
        pool.forEach(opt => {
            const b = document.createElement('button');
            b.className = 'btn';
            b.innerText = opt.t;
            b.onclick = () => resolve(opt);
            list.appendChild(b);
        });
    }

    function resolve(opt) {
        const r = Math.random();
        let feedback = "";
        
        if (r > 0.6) {
            feedback = "¡ÉXITO! " + opt.b;
            setMood('win');
        } else if (r > 0.3) {
            feedback = "INFO: " + opt.n;
            setMood('think');
        } else {
            feedback = "¡DAÑO! " + opt.m;
            state.hp--;
            setMood('hurt');
        }

        state.day++;
        drawHearts();
        
        document.getElementById('dialogue-box').innerText = feedback;
        const list = document.getElementById('action-list');
        list.innerHTML = '<button class="btn btn-green" onclick="renderTurn()">CONTINUAR</button>';
    }

    function drawHearts() {
        let h = "";
        for(let i=0; i<3; i++) h += i < state.hp ? "❤" : "🖤";
        document.getElementById('hearts-display').innerText = h;
    }

    function handleDeath() {
        setMood('lost');
        document.getElementById('dialogue-box').innerText = "¡HAS PERDIDO! Llegaste al día " + state.day + ".";
        const list = document.getElementById('action-list');
        list.innerHTML = '<button class="btn" style="background:#b03a2e" onclick="location.reload()">REINTENTAR</button>';
    }

    drawHearts();
</script>

</body>
</html>
