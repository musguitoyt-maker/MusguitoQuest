<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Musguito Quest</title>
    <style>
        @import url('https://fonts.cdnfonts.com/css/minecraftia');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }

        :root {
            --mc-bg: #c6c6c6;
            --mc-border: #000;
            --mc-green: #5da54a;
            --mc-shadow: #555;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Minecraftia', sans-serif;
            background-color: #000;
            image-rendering: pixelated;
        }

        .main-wall {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('Background.png');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        #game-container {
            width: 100%; height: 100%;
            background-color: rgba(198, 198, 198, 0.85);
            border: 5px solid var(--mc-border);
            box-shadow: inset -4px -4px 0px var(--mc-shadow), inset 4px 4px 0px #fff;
            display: flex;
            flex-direction: column;
            padding: env(safe-area-inset-top) 10px env(safe-area-inset-bottom) 10px;
        }

        #menu-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('Inicio.png');
            background-size: cover;
            background-position: center;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 20%;
        }

        #top-bar {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.7); border: 3px solid #000;
            padding: 8px 12px; margin: 5px 0;
        }

        #hearts-display { color: #ff0000; font-size: 1.2rem; text-shadow: 2px 2px 0px #000; }
        .day-label { font-size: 0.75rem; color: #fff; text-shadow: 1px 1px 0px #000; }

        #visual-box {
            flex: 1.5;
            background-image: url('Background.png');
            background-size: cover;
            background-position: center;
            border: 4px solid #000;
            display: flex; justify-content: center; align-items: flex-end;
            margin-bottom: 10px;
            position: relative;
            min-height: 160px;
        }

        #musguito-sprite {
            height: 90%; width: auto;
            image-rendering: pixelated;
        }

        #dialogue-box {
            background: #fff; border: 3px solid #000;
            padding: 12px; color: #111; font-size: 0.75rem;
            min-height: 95px; max-height: 115px; margin-bottom: 10px;
            box-shadow: inset 3px 3px 0 #bbb; line-height: 1.3;
            overflow-y: auto;
        }

        #action-list { 
            display: flex; flex-direction: column; 
            gap: 6px; padding-bottom: 10px; 
            margin-top: auto;
        }

        .btn {
            background: #999; border: 3px solid #000;
            box-shadow: inset -3px -3px 0 #555, inset 3px 3px 0 #ccc;
            color: #fff; padding: 12px 6px;
            font-family: 'Minecraftia', sans-serif; font-size: 0.7rem;
            text-shadow: 1px 1px 0 #000; cursor: pointer; width: 100%;
        }

        .btn:active { transform: translateY(2px); box-shadow: inset 3px 3px 0 #555; }
        .btn-green { background: var(--mc-green); box-shadow: inset -3px -3px 0 #3a6b30, inset 3px 3px 0 #a4e095; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="main-wall"></div>

<div id="game-container">
    <div id="menu-screen">
        <button class="btn btn-green" onclick="initGame()" style="width: 80%;">JUGAR</button>
    </div>

    <div id="top-bar">
        <span class="day-label">DÍA <span id="day-counter">1</span></span>
        <span id="hearts-display">❤❤❤</span>
    </div>

    <div id="visual-box">
        <img src="Musguito.png" id="musguito-sprite" alt="Musguito">
    </div>

    <div id="dialogue-box">Generando mundo procedural...</div>
    <div id="action-list"></div>
</div>

<script>
    // --- MOTOR DE GENERACIÓN COHERENTE Y ALEATORIA ---
    const engine = {
        sujetos: ["Un Creeper azul", "Un Admin invisible", "Un pequeño Ghast", "Un aldeano rico", "Un lobo con armadura", "Un Enderman curioso", "Un ejército de Slimes"],
        verbos: ["está custodiando", "acaba de robar", "intenta destruir", "está saltando sobre", "quiere quitarte", "ha bloqueado el paso a"],
        objetos: ["tu pico de diamante", "una tarta de manzana", "el portal al Nether", "tu inventario secreto", "una cubeta con lava", "tu cama de lana"],
        lugares: ["en medio de la aldea", "en una cueva profunda", "cerca de un barranco", "dentro de tu base", "bajo un árbol de roble"],

        verbosAccion: ["Atacar con", "Huir usando", "Protegerse con", "Negociar con", "Saltar con"],
        herramientas: ["una espada de madera", "una perla de ender", "un bloque de tierra", "una manzana dorada", "un cubo de agua", "fuegos artificiales"],

        generarHistoria() {
            const s = this.sujetos[Math.floor(Math.random()*this.sujetos.length)];
            const v = this.verbos[Math.floor(Math.random()*this.verbos.length)];
            const o = this.objetos[Math.floor(Math.random()*this.objetos.length)];
            const l = this.lugares[Math.floor(Math.random()*this.lugares.length)];
            return `${s} ${v} ${o} ${l}.`;
        },

        generarOpcion() {
            const va = this.verbosAccion[Math.floor(Math.random()*this.verbosAccion.length)];
            const h = this.herramientas[Math.floor(Math.random()*this.herramientas.length)];
            return `${va} ${h}`;
        }
    };

    let state = { day: 1, hp: 3 };

    function initGame() {
        document.getElementById('menu-screen').classList.add('hidden');
        renderTurn();
    }

    function setMood(type) {
        const sprite = document.getElementById('musguito-sprite');
        const moodMap = { 'normal': '', 'win': '1', 'think': '2', 'hurt': '3', 'lost': '4' };
        sprite.src = `Musguito${moodMap[type]}.png`;
        sprite.onerror = () => { sprite.alt = `[Musguito ${type}]`; };
    }

    function renderTurn() {
        if (state.hp <= 0) return handleDeath();
        
        setMood('normal');
        document.getElementById('day-counter').innerText = state.day;
        document.getElementById('dialogue-box').innerText = engine.generarHistoria() + " ¿Qué vas a hacer?";
        
        const list = document.getElementById('action-list');
        list.innerHTML = '';

        // Generar 2 opciones únicas al azar
        let opts = new Set();
        while(opts.size < 2) opts.add(engine.generarOpcion());
        
        opts.forEach(text => {
            const b = document.createElement('button');
            b.className = 'btn';
            b.innerText = text;
            b.onclick = () => resolve(text);
            list.appendChild(b);
        });
    }

    function resolve(decision) {
        const r = Math.random();
        let feedback = "";
        
        if (r > 0.6) {
            feedback = `¡LOGRADO! Al usar eso, lograste salvar la situación y ganar experiencia.`;
            setMood('win');
        } else if (r > 0.3) {
            feedback = `EXTRAÑO... Lo que hiciste no ayudó mucho, pero al menos sigues en pie.`;
            setMood('think');
        } else {
            feedback = `¡OOF! Eso salió fatal. Perdiste salud intentando realizar esa acción.`;
            state.hp--;
            setMood('hurt');
        }

        state.day++;
        drawHearts();
        
        document.getElementById('dialogue-box').innerText = feedback;
        const list = document.getElementById('action-list');
        list.innerHTML = '<button class="btn btn-green" onclick="renderTurn()">CONTINUAR</button>';
    }

    function drawHearts() {
        let h = "";
        for(let i=0; i<3; i++) h += i < state.hp ? "❤" : "🖤";
        document.getElementById('hearts-display').innerText = h;
    }

    function handleDeath() {
        setMood('lost');
        document.getElementById('dialogue-box').innerText = "Has caído en combate. Sobreviviste " + (state.day - 1) + " días en este mundo.";
        const list = document.getElementById('action-list');
        list.innerHTML = '<button class="btn" style="background:#b03a2e" onclick="location.reload()">RESPAWN</button>';
    }

    drawHearts();
</script>

</body>
</html>
